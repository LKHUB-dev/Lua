name: Update games.lua

on:
  push:
    paths:
      - 'games/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate games.lua
        run: node scripts/update-games.js
        env:
          SCRIPT_BASE_URL: ${{ vars.SCRIPT_BASE_URL }}

      - name: Commit if changed
        run: |
          git diff --quiet games.lua || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add games.lua
            git commit -m "chore: auto-update games.lua from placeIds"
            git push
          }
